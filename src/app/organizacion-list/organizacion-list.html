<h2>Organizaciones</h2>

<p *ngIf="loading">Cargando...</p>
<p *ngIf="!loading && errorMsg">{{ errorMsg }}</p>

<ul class="list" *ngIf="!loading && !errorMsg && organizaciones.length > 0">
  <li class="card" *ngFor="let org of organizaciones; trackBy: trackById">
    <div>
    <span class="name">{{ org.name }}</span>
    </div>
    <div>
    <span class="muted" >{{ org._id }}</span>
    <button type="button" class="btn delete-btn" (click)="delete(org._id)">X</button>
    </div>
  </li>
</ul>

<p *ngIf="!loading && !errorMsg && organizaciones.length === 0">
  No hay organizaciones.
</p>

<button type="button" class="btn" (click)="mostrarFormulario()">Añadir</button>
<div *ngIf="mostrarForm" class="card">

  <h3>Nueva Organización</h3>

  <form [formGroup]="organizacionForm" (ngSubmit)="guardar()">

    <label>Nombre:</label>
    <input type="text" formControlName="nombre" />

    <button type="submit" class="btn" [disabled]="organizacionForm.invalid">Guardar</button>

  </form>

</div>

<button type="button" class="btn" (click)="load()">Recargar</button>
